mod_description=FPS Horizon dynamically adjusts the render distance based on your average FPS, keeping the game smooth without manual tweaking. When performance drops, the view distance shrinks; when FPS recovers, it expands back. Transitions are hidden by an animated distance fog that smoothly opens and closes, preventing visible chunk pop-in. Requires Embeddium for optimal compatibility.
